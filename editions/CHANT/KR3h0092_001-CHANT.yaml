body:
  text: 四體書勢昔者黃帝創制造物有沮誦蒼頡者始作書契以代結繩蓋覩鳥跡以興思也因而遂書則謂之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰會意武信是也五曰轉注考老是也六曰假借令長是也夫指事者在上為上在下為下象形者日滿月虧象其形也形聲者以類為形以配為聲也會意者止戈為武人言為信也轉注者以老壽考也假借者數言同字其聲雖異文意一也自黃帝至三代其文不改及秦用篆書燒焚先典而古文絕矣漢武時魯恭王壞孔子宅得古文尚書春秋論語孝經時人已不復知古文謂之蝌蚪書漢世秘藏希得見魏初傳古文者出於邯鄲淳恆祖敬侯為寫尚書後以示淳而淳不別至正始中立三字石經轉失淳法因蝌蚪之名遂效其形大康元年汲縣人盜發魏襄王塜得策書十餘萬言按敬侯所書猶有髣髴古書者數種其一卷論楚事者最為上妙恆竊悅之故竭愚思以諧其美愧不足以廁前賢之作冀以存古人之象焉古無別名謂之字勢云黃帝之史沮誦蒼頡眺彼鳥跡始作書契紀綱萬事垂法立制帝典用宣質文著世爰暨暴秦滔天作戾大道既泯古文亦滅魏文好古世傳丘墳歷代莫發真偽靡分大晉開元弘道敷訓天垂其象地曜其文天地乃位燦美其章因聲附意類物有方日處君而盈其度月執事而虧其傍雲委蛇而上布星離披以舒光禾卉莽蓴以垂潁山嶽峨嵯而連岡蟲起蟄而若動鳥似飛而未揚觀其措筆綴墨用心精專勢和體均發止無間或守正循撿規折矩旋或方圓靡則因事制權其曲如兮其直如弦矯然特出若龍騰于川森爾下頹若雨墜于天或引筆奮力若鴻雁高飛邈邈翩翩或縱肆婀娜若流蘇懸羽靡靡綿綿是故遠而望之若翔鳳厲水清波漪漣就而察之有若自然信黃唐之遺跡為六藝之範先籀篆盖其子孫隸草乃其曾玄聊觀象以致思非言辭之所宣昔周宣王時史籀始著大篆十五篇或與古同或與古異世謂之籀書者也及平王東遷諸侯力政家殊國異而文字乖形秦始皇帝初兼天下丞相李斯乃損益之罷不合秦文者斯作蒼頡篇中車府令趙高作爰歷篇太史令胡毋敬作博學篇皆取史籀大篆或頗省改所謂小篆者或曰下邳人程邈為獄吏得罪始皇幽繫雲陽十年從獄中作大篆少者增益多者損滅方者使圓圓者使方奏之始皇始皇善之出以為御史使定書或曰邈所定乃隸字也自秦壞古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書王莽時使司空甄酆校文字部改定古文復有六書一曰古文孔氏壁中書也二曰奇字即古文而異者三曰傳書秦篆書也四曰佐書即隸書也五曰繆篆所以摹印也六曰鳥書所以書幡信也許氏撰說文用篆書為正以為體例最可得而論也秦時李斯號為工篆諸山及銅人銘皆斯書也漢建初中扶風曹喜少異於斯而亦稱善邯鄲淳師焉略究其妙韋誕師淳而不及也太和中誕為成都太守以能書留補待中魏氏寶器銘題皆誕書也漢末又有蔡邕采斯喜之法為古今雜形然精密閑理不如淳也邕作篆勢曰因為鳥跡蒼頡循聖作則制文體有六篆妙巧入神或象龜文或比龍鱗紆體放尾長翅短身頹若黍稷之垂蘊若蟲蛇之棼縕揚波振擊龍躍鳥震延頸脅翼勢似凌雲或輕舉內投微本濃末若絕若連似冰露緣絲凝垂下從者如懸衡者如編杪者邪趣不方不圓若行若飛跂跂翾翾遠而望之象鴻鵠群遊絡繹遷延近而視之端際而不可得見指撝不可勝原研桑不能數其詰屈離婁不能覩其隙間般垂揖讓而辭巧籀誦拱手而韜翰處篇籍之首目粲斌斌其可觀摛華艷於紈素為學藝之範先嘉文德之弘懿蘊作者之莫刊思字體之俯仰舉大略而論旃秦既用篆奏事繁多篆字難成即令隸人佐書曰隸字漢因行之獨符印璽幡信題署用篆隸書者篆之捷也上谷王次仲始作楷法至靈帝好書時多能者而師宜官為最大則一字徑丈小則方寸千言甚矜其能或時不持錢詣酒家飲因書其壁顧觀者以佳酒討錢足而滅之每書輒削而楚其柎梁鵠乃益為版而飲之酒候其醉而竊其柎鵠卒以書至選部尚書宜官後為袁術將今鉅鹿宋子有耿球碑是術所立其書甚工云是宜官書也梁鵠奔劉表魏武帝破荊州募求鵠鵠之為選部也魏武欲為洛陽令而以為北部尉故懼而自縛詣門署軍假司馬在秘書自效是以今者多有鵠手跡魏武帝懸著帳中及以釘壁玩之以為勝宜官今宮殿題署多是鵠書鵠宜為大字邯鄲淳宜為小字鵠謂淳得次仲法然鵠之用筆有名魏初而有鍾胡二家為行書法俱學之於劉德昇而鍾氏小異然亦各有奇巧今大行於世作隸勢曰鳥跡之變乃為佐隸蠲彼繁文崇此簡易厥用既行體象有度煥若星陳鬱若雲布其大徑尋細不容髮隨事從宜靡有常制或穹窿恢廓或櫛比鍼列或砥平繩直或蜿蜒繆戾或長斜角趣或規旋矩折修短相副異體同勢奮筆輕舉離而不絕纖波濃點錯落其間若鍾簴設張庭燎飛煙嶄巖崔嵯高下屬連似崇臺重宇層雲冠山遠而望之若雲龍在天近而察之如心亂目眩奇姿譎誕不可勝原研桑所不能計宰賜所不能言何草篆之足算而斯文之未宣豈體大之難覩將秘奧之不傳聊佇思而詳觀舉大較而論旃漢興而有草書不知作者姓名至章帝時齊相杜伯度號稱善作篇後有崔瑗崔寔亦旨稱工杜氏結字甚安而書體微瘦崔氏甚得筆勢而結字小踈弘農張伯英者因而轉精其巧凡家之衣帛必書而後練之臨池學書池水盡黑下筆必為楷則常曰怱怱不暇草書寸紙不見遺至今世尤寶其書韋仲將謂之草聖伯英弟文舒者次伯英又有姜孟頴梁孔達田彥和及韋仲將之徒皆伯英弟子有名於世然殊不及文舒也羅叔景趙元嗣者與伯英並時見稱於西京而矜巧自與眾頗惑之故伯英自稱上比崔杜不足下方羅趙有餘河間張超亦有名雖然與崔氏同州不如伯英之得其法也崔瑗作草書勢曰書契之興始自頡皇寫鳥跡以定文章爰暨末葉典籍彌繁時之多辟政之多權官事荒蕪勦其墨翰惟作佐隸舊字是刪草書之法盖又簡略應時踰指用於卒迫兼功并用愛日省力奇險之變豈必古式觀其法象俯仰有儀方不中矩圓不中規仰左揚右兀若踈崎獸跋鳥峙志在飛移狡兔暴駭將奔未馳或黝黭𪑮狀似連珠絕而不離畜怒奮鬱放逸生奇忽凌邃惴慄若據槅臨危旁點邪附以蜩螗挶枝絕筆收勢餘綖虬結若杜伯捷毒看隙緣巇螣蛇赴穴頭沒尾垂是故遠而望之漼焉若沮岸崩崖就而察之一畫不可移機微要妙臨時從宜略舉大較髣髴若斯
